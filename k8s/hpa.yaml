apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ENV_NAME}}-hpa
  namespace: dev-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ENV_NAME}}
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
