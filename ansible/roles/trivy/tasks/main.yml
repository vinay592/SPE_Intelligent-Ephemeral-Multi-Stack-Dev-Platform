---
- name: Check if Trivy is already installed
  ansible.builtin.command: trivy --version
  register: trivy_check
  ignore_errors: yes
  changed_when: false
  failed_when: false

- name: Setup Trivy repo and install if missing
  block:
    - name: Ensure dependencies are installed
      ansible.builtin.apt:
        name:
          - wget
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Create keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Aqua Security GPG key
      ansible.builtin.shell: "wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor -o /etc/apt/keyrings/trivy.gpg"
      args:
        creates: /etc/apt/keyrings/trivy.gpg

    - name: Add Trivy APT repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb {{ ansible_distribution_release }} main"
        state: present
        filename: trivy

    - name: Install Trivy package
      ansible.builtin.apt:
        name: trivy
        state: present
        update_cache: yes

  when: trivy_check.rc != 0
