<!DOCTYPE html>
<html>
<head>
<title>Dev Platform</title>

<style>

/* ===== GLOBAL ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    margin: 0;
    color: white;
}

/* ===== CONTAINER ===== */
.container {
    width: 55%;
    margin: auto;
    margin-top: 60px;
}

/* ===== TOP BAR ===== */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

h2 {
    margin: 0;
}

/* ===== CARD ===== */
.card {
    background: rgba(255,255,255,0.06);
    padding: 25px;
    border-radius: 16px;
    margin-bottom: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
}

/* ===== FORM ===== */
.section {
    margin-bottom: 15px;
}

.slider-row {
    margin: 20px 0;
}

.slider-header {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 5px;
    opacity: 0.9;
}

input[type="range"] {
    width: 100%;
}

/* ===== BUTTONS ===== */
.btn-group {
    display: flex;
    gap: 12px;
    margin-top: 10px;
}

button {
    border: none;
    border-radius: 8px;
    padding: 10px 15px;
    cursor: pointer;
    font-weight: 600;
}

.create-btn {
    background: #00e676;
    color: black;
}

.refresh-btn {
    background: #2979ff;
    color: white;
}

.logout-btn {
    background: #ff5252;
    color: white;
}

/* ===== ENV LIST ===== */
.env-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.05);
    padding: 18px;
    border-radius: 12px;
    margin-top: 12px;
    transition: 0.3s;
}

.env-item:hover {
    background: rgba(255,255,255,0.1);
}

.env-info {
    font-size: 14px;
}

/* ===== STATUS ===== */
.status {
    display: inline-block;
    background: rgba(0,230,118,0.2);
    color: #00e676;
    padding: 4px 8px;
    border-radius: 6px;
    margin-top: 4px;
    font-weight: bold;
}

/* ===== TIMER ===== */
.time {
    color: #ffd54f;
    margin-top: 5px;
}

/* ===== ACTION BUTTONS ===== */
.env-actions button {
    margin-left: 10px;
}

.open-btn {
    background: #00bcd4;
    color: white;
}

.delete-btn {
    background: #ff5252;
    color: white;
}

</style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <h2>🚀 Dev Platform</h2>
        <div>
            👋 <b id="user"></b>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- CREATE -->
    <div class="card">
        <h3>Create Environment</h3>

        <div class="section">
            <select id="stack">
                <option value="flask">Flask</option>
                <option value="mern">MERN</option>
                <option value="java">Java</option>
                <option value="ml">ML</option>
            </select>
        </div>

        <div class="slider-row">
            <div class="slider-header">
                <span>CPU</span>
                <span id="cpuVal">250m</span>
            </div>
            <input type="range" id="cpu" min="100" max="500" step="50" value="250">
        </div>

        <div class="slider-row">
            <div class="slider-header">
                <span>Memory</span>
                <span id="memVal">256Mi</span>
            </div>
            <input type="range" id="memory" min="128" max="512" step="64" value="256">
        </div>

        <div class="btn-group">
            <button class="create-btn" onclick="createEnv()">Create</button>
            <button class="refresh-btn" onclick="getEnvs()">Refresh</button>
        </div>

        <p id="status"></p>
    </div>

    <!-- ENVS -->
    <div class="card">
        <h3>Active Environments</h3>
        <div id="output">No environments</div>
    </div>

</div>

<script>
const BASE_URL = "http://localhost:5001";
const user = localStorage.getItem("user");

if (!user) window.location.href = "login.html";
document.getElementById("user").innerText = user;

// sliders
cpu.oninput = () => cpuVal.innerText = cpu.value + "m";
memory.oninput = () => memVal.innerText = memory.value + "Mi";

function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

function createEnv() {
    status.innerText = "⚡ Creating...";

    fetch(BASE_URL + "/create-env", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            stack: stack.value,
            user: user,
            cpu: cpu.value + "m",
            memory: memory.value + "Mi"
        })
    })
    .then(res => res.json())
    .then(() => {
        status.innerText = "✅ Created!";
        getEnvs();
    });
}

function getTimeLeft(createdAt) {
    const ttl = 1800;
    const now = Math.floor(Date.now() / 1000);
    const diff = ttl - (now - createdAt);

    if (diff <= 0) return null;

    const mins = Math.floor(diff / 60);
    const secs = Math.floor(diff % 60);

    return `${mins}m ${secs}s`;
}

function getEnvs() {
    fetch(BASE_URL + "/envs")
    .then(res => res.json())
    .then(data => {
        let html = "";

        if (!data[user] || data[user].length === 0) {
            html = "No environments";
        } else {
            data[user].forEach(env => {
                const timeLeft = getTimeLeft(env.created_at);
                if (!timeLeft) return;

                html += `
                <div class="env-item">
                    <div class="env-info">
                        <b>${env.name}</b><br>
                        Port: ${env.port}<br>
                        <span class="status">Running</span><br>
                        <div class="time">⏳ ${timeLeft}</div>
                    </div>
                    <div class="env-actions">
                        <button class="open-btn" onclick="openEnv('${env.name}')">Open</button>
                        <button class="delete-btn" onclick="deleteEnv('${env.name}')">Delete</button>
                    </div>
                </div>`;
            });
        }

        output.innerHTML = html;
    });
}

function openEnv(name) {
    fetch(BASE_URL + "/open-env", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ env_name: name })
    })
    .then(res => res.json())
    .then(data => showLoadingScreen(data.url));
}

function showLoadingScreen(url) {
    const win = window.open("", "_blank");

    win.document.write(`
        <body style="background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;">
            <h2>🚀 Starting environment...</h2>
        </body>
    `);

    setTimeout(() => {
        win.location.href = url;
    }, 3000);
}

function deleteEnv(name) {
    fetch(BASE_URL + "/delete-env", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ env_name: name })
    }).then(getEnvs);
}

setInterval(getEnvs, 1000);
getEnvs();
</script>

</body>
</html>
