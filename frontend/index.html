<!DOCTYPE html>

<html>
<head>
    <title>Dev Platform</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
        }


    h2 {
        color: #333;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }

    select, input {
        padding: 8px;
        margin-right: 10px;
    }

    button {
        padding: 8px 14px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .create-btn {
        background-color: #28a745;
        color: white;
    }

    .show-btn {
        background-color: #007bff;
        color: white;
    }

    .delete-btn {
        background-color: #dc3545;
        color: white;
        margin-left: 10px;
    }

    .open-btn {
        background-color: #17a2b8;
        color: white;
        margin-left: 10px;
        text-decoration: none;
        padding: 6px 10px;
        border-radius: 5px;
    }

    .env-item {
        padding: 10px;
        border-bottom: 1px solid #eee;
    }

    #status {
        margin-top: 10px;
        font-weight: bold;
    }
</style>


</head>

<body>

<h2>🚀 Dev Platform Dashboard</h2>

<div class="card">
    <h3>Create Environment</h3>


<select id="stack">
    <option value="flask">Flask</option>
    <option value="mern">MERN</option>
    <option value="java">Java</option>
    <option value="ml">ML</option>
</select>

<input type="text" id="user" placeholder="Enter username" />

<button class="create-btn" onclick="createEnv(event)">Create</button>
<button class="show-btn" onclick="getEnvs()">Refresh</button>

<p id="status"></p>


</div>

<div class="card">
    <h3>Active Environments</h3>
    <div id="output"></div>
</div>

<script>
const BASE_URL = "http://localhost:5001"; // Flask backend is running on port 5001 locally
const NODE_IP = "http://192.168.49.2"; // Minikube IP for accessing the exposed K8s nodes
function createEnv(event) {
    const stack = document.getElementById("stack").value;
    const user = document.getElementById("user").value;
    const status = document.getElementById("status");
    const btn = event.target;

    btn.disabled = true;
    status.style.color = "blue";
    status.innerText = "Creating environment... ⏳";

    fetch(`${BASE_URL}/create-env`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ stack: stack, user: user })
    })
    .then(async res => {
        const data = await res.json();

        // 🔴 HANDLE ERROR PROPERLY
        if (!res.ok || data.error) {
            status.style.color = "red";
            status.innerText = data.error || "Failed to create ❌";
            btn.disabled = false;
            return;
        }

        // ✅ SUCCESS
        status.style.color = "green";
        status.innerText = "Environment created successfully ✅";
        btn.disabled = false;

        getEnvs();
    })
    .catch(err => {
        status.style.color = "red";
        status.innerText = "Server error ❌";
        btn.disabled = false;
        console.log(err);
    });
}

function getEnvs() {
    fetch(`${BASE_URL}/envs`)
    .then(res => res.json())
    .then(data => {

        let html = "";

        for (let user in data) {
            html += "<h4>User: " + user + "</h4>";

            data[user].forEach(env => {

              html += `
              <div class="env-item">
                  <b>${env.name}</b> (Port: ${env.port})
                  <button class="open-btn" onclick="openEnv('${env.name}')">Open</button>
                  <button class="delete-btn" onclick="deleteEnvDirect('${env.name}')">Delete</button>
              </div>
              ` ;
             });
        }

        document.getElementById("output").innerHTML = html;
    });
}
function openEnv(envName) {
    fetch(`${BASE_URL}/open-env`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ env_name: envName })
    })
    .then(res => res.json())
    .then(data => {
        window.open(data.url, "_blank");
    })
    .catch(err => {
        alert("Failed to open environment");
        console.log(err);
    });
}

function deleteEnvDirect(envName) {
    const status = document.getElementById("status");

    status.style.color = "blue";
    status.innerText = "Deleting environment... ⏳";

    fetch(`${BASE_URL}/delete-env`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ env_name: envName })
    })
    .then(res => res.json())
    .then(data => {
        status.style.color = "green";
        status.innerText = "Environment deleted ✅";

        getEnvs();
    })
    .catch(err => {
        status.style.color = "red";
        status.innerText = "Error deleting ❌";
        console.log(err);
    });
}
</script>

</body>
</html>
